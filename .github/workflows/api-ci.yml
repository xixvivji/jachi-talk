name: API CI

on:
  pull_request:
    branches:
      - main
      - develop
    paths:
      - "apps/api/**"
      - ".github/workflows/api-ci.yml"
  push:
    branches:
      - main
      - develop
    paths:
      - "apps/api/**"
      - ".github/workflows/api-ci.yml"

jobs:
  api-test:
    name: API test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Run tests
        run: mvn test
